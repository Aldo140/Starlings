<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a34">
    <meta name="description" content="Anonymous stories, community resources, and practical support for young people impacted by family substance use.">
    <title>Starlings Support Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-teal-900: #1e3a34;
            --brand-teal-50: #e8f3f1;
            --brand-teal-500: #448a7d;
            --coral-400: #e57c6e;
        }

        html,
        body,
        #root {
            position: relative;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--brand-teal-900);
        }

        .leaflet-container {
            background: #f0f4f3 !important;
            outline: none;
        }

        .hero-title {
            letter-spacing: -0.05em;
            line-height: 0.95;
            font-size: clamp(2.4rem, 8.5vh, 7rem);
        }

        @media (max-width: 400px) {
            .hero-title {
                font-size: clamp(2rem, 7vh, 3.4rem);
            }
        }

        @media (min-width: 768px) {
            .hero-title {
                font-size: clamp(4rem, 12vh, 8.5rem);
            }
        }

        .hero-gradient {
            background: linear-gradient(135deg, var(--brand-teal-900) 0%, var(--brand-teal-500) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .ui-overlay {
            z-index: 2000 !important;
        }

        @media (max-width: 767px) {
            .leaflet-control-zoom {
                display: none !important;
            }
        }

        /* ══════════════════════════════════════════════════
           COMMUNITY PARTNERS — Flashlight panel (Cobp/Uiverse)
           Colors remapped to Starlings teal / coral palette
           ══════════════════════════════════════════════════ */
        .cp-flashlight {
            --cp-fl-1: #0f172a;
            --cp-fl-2: #1e3a34;
            --cp-fl-3: #2d5a52;
            --cp-fl-4: #172420;
            position: absolute;
            inset: 0;
            background-color: var(--cp-fl-1);
            background-image:
                linear-gradient(to top, var(--cp-fl-2) 5%, var(--cp-fl-1) 6%, var(--cp-fl-1) 7%, transparent 7%),
                linear-gradient(to bottom, var(--cp-fl-1) 30%, transparent 80%),
                linear-gradient(to right, var(--cp-fl-2), var(--cp-fl-4) 5%, transparent 5%),
                linear-gradient(to right, transparent 6%, var(--cp-fl-2) 6%, var(--cp-fl-4) 9%, transparent 9%),
                linear-gradient(to right, transparent 27%, var(--cp-fl-2) 27%, var(--cp-fl-4) 34%, transparent 34%),
                linear-gradient(to right, transparent 51%, var(--cp-fl-2) 51%, var(--cp-fl-4) 57%, transparent 57%),
                linear-gradient(to bottom, var(--cp-fl-1) 35%, transparent 35%),
                linear-gradient(to right, transparent 42%, var(--cp-fl-2) 42%, var(--cp-fl-4) 44%, transparent 44%),
                linear-gradient(to right, transparent 45%, var(--cp-fl-2) 45%, var(--cp-fl-4) 47%, transparent 47%),
                linear-gradient(to right, transparent 48%, var(--cp-fl-2) 48%, var(--cp-fl-4) 50%, transparent 50%),
                linear-gradient(to right, transparent 87%, var(--cp-fl-2) 87%, var(--cp-fl-4) 91%, transparent 91%),
                linear-gradient(to bottom, var(--cp-fl-1) 37.5%, transparent 37.5%),
                linear-gradient(to right, transparent 14%, var(--cp-fl-2) 14%, var(--cp-fl-4) 20%, transparent 20%),
                linear-gradient(to bottom, var(--cp-fl-1) 40%, transparent 40%),
                linear-gradient(to right, transparent 10%, var(--cp-fl-2) 10%, var(--cp-fl-4) 13%, transparent 13%),
                linear-gradient(to right, transparent 21%, var(--cp-fl-2) 21%, var(--cp-fl-4) 25%, transparent 25%),
                linear-gradient(to right, transparent 58%, var(--cp-fl-2) 58%, var(--cp-fl-4) 64%, transparent 64%),
                linear-gradient(to right, transparent 92%, var(--cp-fl-2) 92%, var(--cp-fl-4) 95%, transparent 95%),
                linear-gradient(to bottom, var(--cp-fl-1) 48%, transparent 48%),
                linear-gradient(to right, transparent 96%, var(--cp-fl-2) 96%, var(--cp-fl-4) 99%, transparent 99%),
                linear-gradient(to bottom, transparent 68.5%, transparent 76%, var(--cp-fl-1) 76%, var(--cp-fl-1) 77.5%, transparent 77.5%, transparent 86%, var(--cp-fl-1) 86%, var(--cp-fl-1) 87.5%, transparent 87.5%),
                linear-gradient(to right, transparent 35%, var(--cp-fl-2) 35%, var(--cp-fl-4) 41%, transparent 41%),
                linear-gradient(to bottom, var(--cp-fl-1) 68%, transparent 68%),
                linear-gradient(to right, transparent 78%, var(--cp-fl-3) 78%, var(--cp-fl-3) 80%, transparent 80%, transparent 82%, var(--cp-fl-3) 82%, var(--cp-fl-3) 83%, transparent 83%),
                linear-gradient(to right, transparent 66%, var(--cp-fl-2) 66%, var(--cp-fl-4) 85%, transparent 85%);
            background-size: 300px 150px;
            background-position: center bottom;
        }
        .cp-flashlight::before {
            content: "";
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            background-color: var(--cp-fl-1);
            background-image:
                linear-gradient(to top, #e8f3f1 5%, var(--cp-fl-1) 6%, var(--cp-fl-1) 7%, transparent 7%),
                linear-gradient(to bottom, var(--cp-fl-1) 30%, transparent 30%),
                linear-gradient(to right, #448a7d, #2d5a52 5%, transparent 5%),
                linear-gradient(to right, transparent 6%, #e57c6e 6%, #d46a5c 9%, transparent 9%),
                linear-gradient(to right, transparent 27%, #3d7a6e 27%, #1e3a34 34%, transparent 34%),
                linear-gradient(to right, transparent 51%, #e57c6e 51%, #d46a5c 57%, transparent 57%),
                linear-gradient(to bottom, var(--cp-fl-1) 35%, transparent 35%),
                linear-gradient(to right, transparent 42%, #448a7d 42%, #1e3a34 44%, transparent 44%),
                linear-gradient(to right, transparent 45%, #448a7d 45%, #1e3a34 47%, transparent 47%),
                linear-gradient(to right, transparent 48%, #448a7d 48%, #1e3a34 50%, transparent 50%),
                linear-gradient(to right, transparent 87%, #6a9e96 87%, #3d7a6e 91%, transparent 91%),
                linear-gradient(to bottom, var(--cp-fl-1) 37.5%, transparent 37.5%),
                linear-gradient(to right, transparent 14%, #7ec8ba 14%, #448a7d 20%, transparent 20%),
                linear-gradient(to bottom, var(--cp-fl-1) 40%, transparent 40%),
                linear-gradient(to right, transparent 10%, #2d5a52 10%, #1e3a34 13%, transparent 13%),
                linear-gradient(to right, transparent 21%, #d46a5c 21%, #b85a4e 25%, transparent 25%),
                linear-gradient(to right, transparent 58%, #d46a5c 58%, #b85a4e 64%, transparent 64%),
                linear-gradient(to right, transparent 92%, #2d5a52 92%, #172420 95%, transparent 95%),
                linear-gradient(to bottom, var(--cp-fl-1) 48%, transparent 48%),
                linear-gradient(to right, transparent 96%, #2d5a52 96%, #172420 99%, transparent 99%),
                linear-gradient(to bottom, transparent 68.5%, transparent 76%, var(--cp-fl-1) 76%, var(--cp-fl-1) 77.5%, transparent 77.5%, transparent 86%, var(--cp-fl-1) 86%, var(--cp-fl-1) 87.5%, transparent 87.5%),
                linear-gradient(to right, transparent 35%, #e57c6e 35%, #d46a5c 41%, transparent 41%),
                linear-gradient(to bottom, var(--cp-fl-1) 68%, transparent 68%),
                linear-gradient(to right, transparent 78%, #fbd6d1 78%, #fbd6d1 80%, transparent 80%, transparent 82%, #fbd6d1 82%, #fbd6d1 83%, transparent 83%),
                linear-gradient(to right, transparent 66%, #e57c6e 66%, #c4614e 85%, transparent 85%);
            background-size: 300px 150px;
            background-position: center bottom;
            clip-path: circle(90px at -25% 10%);
            animation: cp_flashlight_scan 20s ease infinite;
        }
        .cp-flashlight::after {
            content: "";
            width: 25px;
            height: 10px;
            position: absolute;
            left: calc(50% + 59px);
            bottom: 20px;
            background-repeat: no-repeat;
            background-image: radial-gradient(circle, #e8f3f1 50%, transparent 50%),
                radial-gradient(circle, #e8f3f1 50%, transparent 50%);
            background-size: 10px 10px;
            background-position: left center, right center;
            animation: cp_flashlight_eyes 20s infinite;
        }
        @keyframes cp_flashlight_scan {
            0%   { clip-path: circle(90px at -25% 10%); }
            38%  { clip-path: circle(90px at 60% 20%); }
            39%  { opacity: 1; clip-path: circle(90px at 60% 86%); }
            40%  { opacity: 0; clip-path: circle(90px at 60% 86%); }
            41%  { opacity: 1; clip-path: circle(90px at 60% 86%); }
            42%  { opacity: 0; clip-path: circle(90px at 60% 86%); }
            54%  { opacity: 0; clip-path: circle(90px at 60% 86%); }
            55%  { opacity: 1; clip-path: circle(90px at 60% 86%); }
            59%  { opacity: 1; clip-path: circle(90px at 60% 86%); }
            64%  { clip-path: circle(90px at 45% 78%); }
            68%  { clip-path: circle(90px at 85% 89%); }
            72%  { clip-path: circle(90px at 60% 86%); }
            74%  { clip-path: circle(90px at 60% 86%); }
            100% { clip-path: circle(90px at 150% 50%); }
        }
        @keyframes cp_flashlight_eyes {
            0%, 38%  { opacity: 0; }
            39%, 41% { opacity: 1; transform: scaleY(1); }
            40% {
                transform: scaleY(0);
                filter: none;
                background-image: radial-gradient(circle, #e8f3f1 50%, transparent 50%),
                    radial-gradient(circle, #e8f3f1 50%, transparent 50%);
            }
            41% {
                transform: scaleY(1);
                background-image: radial-gradient(circle, #e57c6e 50%, transparent 50%),
                    radial-gradient(circle, #e57c6e 50%, transparent 50%);
                filter: drop-shadow(0 0 4px rgba(229, 124, 110, 0.8));
            }
            42%, 100% { opacity: 0; }
        }

        /* ══════════════════════════════════════════════════
           COMMUNITY PARTNERS — Spinning-word badge (kennyotsu)
           bg: teal900 · static text: white/65 · words: coral400
           ══════════════════════════════════════════════════ */
        .cp-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.4rem 0.875rem 0.4rem 0.625rem;
            border-radius: 9999px;
            background-color: #1e3a34;
            border: 1px solid rgba(68, 138, 125, 0.25);
            box-shadow: 0 4px 16px -4px rgba(30, 58, 52, 0.4);
        }
        .cp-badge-loader {
            color: rgba(255, 255, 255, 0.65);
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            box-sizing: content-box;
            height: 14px;
            display: flex;
            align-items: center;
        }
        .cp-badge-words {
            overflow: hidden;
            position: relative;
            height: 14px;
        }
        .cp-badge-words::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(#1e3a34 10%, transparent 30%, transparent 70%, #1e3a34 90%);
            z-index: 20;
        }
        .cp-badge-word {
            display: block;
            height: 14px;
            line-height: 14px;
            padding-left: 5px;
            color: #e57c6e;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            white-space: nowrap;
            animation: cp_word_cycle 5s infinite;
        }
        @keyframes cp_word_cycle {
            10%  { transform: translateY(-102%); }
            25%  { transform: translateY(-100%); }
            35%  { transform: translateY(-202%); }
            50%  { transform: translateY(-200%); }
            60%  { transform: translateY(-302%); }
            75%  { transform: translateY(-300%); }
            85%  { transform: translateY(-402%); }
            100% { transform: translateY(-400%); }
        }

        /* ══════════════════════════════════════════════════
           SVG CIRCLE SPINNER — SelfMadeSystem (loading banner)
           teal500 outer dash · coral400 inner spin
           ══════════════════════════════════════════════════ */
        @keyframes cp_dashArray {
            0%   { stroke-dasharray: 0 1 359 0; }
            50%  { stroke-dasharray: 0 359 1 0; }
            100% { stroke-dasharray: 359 1 0 0; }
        }
        @keyframes cp_spinDashArray {
            0%   { stroke-dasharray: 270 90; }
            50%  { stroke-dasharray: 0 360; }
            100% { stroke-dasharray: 270 90; }
        }
        @keyframes cp_dashOffset {
            0%   { stroke-dashoffset: 365; }
            100% { stroke-dashoffset: 5; }
        }
        @keyframes cp_svgSpin {
            0%          { rotate: 0deg; }
            12.5%, 25%  { rotate: 270deg; }
            37.5%, 50%  { rotate: 540deg; }
            62.5%, 75%  { rotate: 810deg; }
            87.5%, 100% { rotate: 1080deg; }
        }
        .cp-svg-spinner-dash {
            animation: cp_dashArray 2s ease-in-out infinite, cp_dashOffset 2s linear infinite;
        }
        .cp-svg-spinner-spin {
            animation: cp_spinDashArray 2s ease-in-out infinite, cp_svgSpin 8s ease-in-out infinite, cp_dashOffset 2s linear infinite;
            transform-origin: center;
        }

        /* ══════════════════════════════════════════════════
           BOUNCING CUBE LOADER — alexruix (inline sync states)
           Color: coral400 · Full size: 24px
           ══════════════════════════════════════════════════ */
        .cp-cube-loader {
            width: 24px;
            height: 24px;
            position: relative;
            flex-shrink: 0;
            display: inline-block;
        }
        .cp-cube-loader::before {
            content: '';
            width: 24px;
            height: 3px;
            background: rgba(229, 124, 110, 0.3);
            position: absolute;
            top: 30px;
            left: 0;
            border-radius: 50%;
            animation: cp_cube_shadow 0.5s linear infinite;
        }
        .cp-cube-loader::after {
            content: '';
            width: 100%;
            height: 100%;
            background: #e57c6e;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 3px;
            animation: cp_cube_jump 0.5s linear infinite;
        }
        @keyframes cp_cube_jump {
            15%  { border-bottom-right-radius: 2px; }
            25%  { transform: translateY(5px) rotate(22.5deg); }
            50%  { transform: translateY(9px) scale(1, .9) rotate(45deg); border-bottom-right-radius: 20px; }
            75%  { transform: translateY(5px) rotate(67.5deg); }
            100% { transform: translateY(0) rotate(90deg); }
        }
        @keyframes cp_cube_shadow {
            0%, 100% { transform: scale(1, 1); }
            50%       { transform: scale(1.2, 1); }
        }

        /* ══════════════════════════════════════════════════
           BOOK / PAGE-FLIP LOADER — Nawsome
           Community Suggested Resources section decoration
           Gradient: teal500 → teal900
           ══════════════════════════════════════════════════ */
        .cr-book-loader {
            --cr-bg: linear-gradient(135deg, #448a7d, #1e3a34);
            --cr-shadow: rgba(30, 58, 52, 0.28);
            --cr-page: rgba(255, 255, 255, 0.36);
            --cr-fold: rgba(255, 255, 255, 0.52);
            --cr-dur: 3s;
            width: 200px;
            height: 140px;
            position: relative;
        }
        .cr-book-loader::before, .cr-book-loader::after {
            --r: -6deg;
            content: "";
            position: absolute;
            bottom: 8px;
            width: 120px;
            top: 80%;
            box-shadow: 0 16px 12px var(--cr-shadow);
            transform: rotate(var(--r));
        }
        .cr-book-loader::before { left: 4px; }
        .cr-book-loader::after  { --r: 6deg; right: 4px; }
        .cr-book-loader > div {
            width: 100%;
            height: 100%;
            border-radius: 13px;
            position: relative;
            z-index: 1;
            perspective: 600px;
            box-shadow: 0 4px 6px var(--cr-shadow);
            background-image: var(--cr-bg);
        }
        .cr-book-loader > div > ul {
            margin: 0; padding: 0; list-style: none; position: relative;
        }
        .cr-book-loader > div > ul > li {
            --r: 180deg; --o: 0; --c: var(--cr-page);
            position: absolute; top: 10px; left: 10px;
            transform-origin: 100% 50%;
            color: var(--c); opacity: var(--o);
            transform: rotateY(var(--r));
            animation: var(--cr-dur) ease infinite;
        }
        .cr-book-loader > div > ul > li:nth-child(2) { --c: var(--cr-fold); animation-name: cr_page2; }
        .cr-book-loader > div > ul > li:nth-child(3) { --c: var(--cr-fold); animation-name: cr_page3; }
        .cr-book-loader > div > ul > li:nth-child(4) { --c: var(--cr-fold); animation-name: cr_page4; }
        .cr-book-loader > div > ul > li:nth-child(5) { --c: var(--cr-fold); animation-name: cr_page5; }
        .cr-book-loader > div > ul > li > svg { width: 90px; height: 120px; display: block; }
        .cr-book-loader > div > ul > li:first-child { --r: 0deg; --o: 1; }
        .cr-book-loader > div > ul > li:last-child  { --o: 1; }
        .cr-book-loader > span {
            display: block; left: 0; right: 0; top: 100%;
            margin-top: 20px; text-align: center;
            color: #448a7d; font-family: 'Inter', sans-serif;
            font-weight: 900; font-size: 10px; letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        @keyframes cr_page2 {
            0%        { transform: rotateY(180deg); opacity: 0; }
            20%       { opacity: 1; }
            35%, 100% { opacity: 0; }
            50%, 100% { transform: rotateY(0deg); }
        }
        @keyframes cr_page3 {
            15%       { transform: rotateY(180deg); opacity: 0; }
            35%       { opacity: 1; }
            50%, 100% { opacity: 0; }
            65%, 100% { transform: rotateY(0deg); }
        }
        @keyframes cr_page4 {
            30%       { transform: rotateY(180deg); opacity: 0; }
            50%       { opacity: 1; }
            65%, 100% { opacity: 0; }
            80%, 100% { transform: rotateY(0deg); }
        }
        @keyframes cr_page5 {
            45%       { transform: rotateY(180deg); opacity: 0; }
            65%       { opacity: 1; }
            80%, 100% { opacity: 0; }
            95%, 100% { transform: rotateY(0deg); }
        }

        /* ══════════════════════════════════════════════════
           3D PARTNER CARD — Smit-Prajapati
           "Become a Partner" CTA · teal gradient + coral accent
           ══════════════════════════════════════════════════ */
        .cp-3d-parent {
            perspective: 1000px;
        }
        .cp-3d-card {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(135deg, #448a7d 0%, #1e3a34 100%);
            transition: all 0.5s ease-in-out;
            transform-style: preserve-3d;
            box-shadow: rgba(30, 58, 52, 0) 40px 50px 25px -40px,
                        rgba(30, 58, 52, 0.2) 0px 25px 25px -5px;
            position: relative;
        }
        .cp-3d-glass {
            transform-style: preserve-3d;
            position: absolute;
            inset: 8px;
            border-radius: 55px;
            border-top-right-radius: 100%;
            background: linear-gradient(0deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.68) 100%);
            transform: translate3d(0, 0, 25px);
            border-left: 1px solid rgba(255,255,255,0.45);
            border-bottom: 1px solid rgba(255,255,255,0.45);
            transition: all 0.5s ease-in-out;
        }
        .cp-3d-logo {
            position: absolute;
            right: 0; top: 0;
            transform-style: preserve-3d;
        }
        .cp-3d-logo .cp-3d-circle {
            display: block; position: absolute;
            aspect-ratio: 1; border-radius: 50%;
            top: 0; right: 0;
            box-shadow: rgba(30, 58, 52, 0.2) -10px 10px 20px 0px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            background: rgba(68, 138, 125, 0.22);
            transition: all 0.5s ease-in-out;
        }
        .cp-3d-c1 { width: 170px; transform: translate3d(0,0,20px); top: 8px;  right: 8px;  }
        .cp-3d-c2 { width: 140px; transform: translate3d(0,0,40px); top: 10px; right: 10px; backdrop-filter: blur(1px); transition-delay: 0.4s; }
        .cp-3d-c3 { width: 110px; transform: translate3d(0,0,60px); top: 17px; right: 17px; transition-delay: 0.8s; }
        .cp-3d-c4 { width: 80px;  transform: translate3d(0,0,80px); top: 23px; right: 23px; transition-delay: 1.2s; }
        .cp-3d-c5 {
            width: 50px;
            transform: translate3d(0,0,100px); top: 30px; right: 30px;
            display: grid; place-content: center; transition-delay: 1.6s;
        }
        .cp-3d-social-btn {
            width: 30px; aspect-ratio: 1; padding: 5px;
            background: rgba(255,255,255,0.92);
            border-radius: 50%; border: none;
            display: grid; place-content: center;
            box-shadow: rgba(30, 58, 52, 0.45) 0px 7px 5px -5px;
            cursor: pointer; transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .cp-3d-social-btn:nth-child(1) { transition-delay: 0.4s; }
        .cp-3d-social-btn:nth-child(2) { transition-delay: 0.6s; }
        .cp-3d-social-btn:nth-child(3) { transition-delay: 0.8s; }
        .cp-3d-parent:hover .cp-3d-card {
            transform: rotate3d(1, 1, 0, 30deg);
            box-shadow: rgba(30, 58, 52, 0.3) 30px 50px 25px -40px,
                        rgba(30, 58, 52, 0.1) 0px 25px 30px 0px;
        }
        .cp-3d-parent:hover .cp-3d-social-btn {
            transform: translate3d(0, 0, 50px);
            box-shadow: rgba(30, 58, 52, 0.2) -5px 20px 10px 0px;
        }
        .cp-3d-parent:hover .cp-3d-c2 { transform: translate3d(0,0,60px); }
        .cp-3d-parent:hover .cp-3d-c3 { transform: translate3d(0,0,80px); }
        .cp-3d-parent:hover .cp-3d-c4 { transform: translate3d(0,0,100px); }
        .cp-3d-parent:hover .cp-3d-c5 { transform: translate3d(0,0,120px); }

        /* ══════════════════════════════════════════════════
           LARGE CYCLING HEADING VARIANT — reuses cp_word_cycle keyframe
           Use inside a heading with font-cabinet. Slot height = 1 line.
           ══════════════════════════════════════════════════ */
        .cp-words-slot {
            overflow: hidden;
            display: inline-block;
            height: 1.05em;
            line-height: 1.05;
            vertical-align: -0.05em;
        }
        .cp-words-word {
            display: block;
            height: 1.05em;
            line-height: 1.05;
            color: #e57c6e;
            font-style: italic;
            white-space: nowrap;
            /* slightly slower than badge variant (6s vs 5s) */
            animation: cp_word_cycle 6s infinite;
        }

        /* Screenshot auto-scroll pan — pans top→bottom→top so the full page is visible over time */
        @keyframes cp_screenshot_pan {
            0%,  10% { object-position: center top;    }   /* hold at top */
            48%, 52% { object-position: center bottom; }   /* arrive + hold at bottom */
            90%, 100%{ object-position: center top;    }   /* return + hold at top */
        }
        .cp-screenshot-pan {
            animation: cp_screenshot_pan 18s ease-in-out infinite;
            will-change: object-position;
        }

        /* Reduced-motion: disable all custom animations */
        @media (prefers-reduced-motion: reduce) {
            html:focus-within { scroll-behavior: auto; }
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .cp-badge-word,
            .cp-words-word,
            .cp-flashlight::before,
            .cp-flashlight::after,
            .cp-svg-spinner-dash,
            .cp-svg-spinner-spin,
            .cp-cube-loader::before,
            .cp-cube-loader::after,
            .cr-book-loader > div > ul > li,
            .cp-screenshot-pan { animation: none; }
            .cp-3d-parent:hover .cp-3d-card { transform: none; }
        }
    </style>
